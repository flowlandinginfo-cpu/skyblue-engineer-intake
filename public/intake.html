    /* ─── Util ───────────────────────────────────────────────────── */
    const uid = () => Math.random().toString(36).slice(2, 10);
    const fmtCurrency = (n) => (n === '' || n === null || isNaN(n)) ? '-' : new Intl.NumberFormat('th-TH', { maximumFractionDigits: 2 }).format(Number(n));

    /* ─── Numeric input helpers (NO RE-RENDER ON TYPING) ─────────
     * Pattern: typing → raw value (state update only, no DOM rebuild)
     *          blur   → format with commas + render derived UI
     *          focus  → strip commas + select all
     * Strips paste of "1,000,000" → "1000000" automatically.
     */
    function formatThaiNumber(v) {
      if (v === '' || v === null || v === undefined) return '';
      const n = Number(String(v).replace(/,/g, ''));
      if (isNaN(n)) return '';
      return new Intl.NumberFormat('th-TH', { maximumFractionDigits: 2 }).format(n);
    }
    function cleanNumeric(s) {
      // remove comma, spaces, keep digits + single dot
      let v = String(s).replace(/[^\d.]/g, '');
      const parts = v.split('.');
      if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
      return v;
    }
    function onNumFocus(el) {
      const raw = el.dataset.raw || cleanNumeric(el.value);
      el.value = raw;
      el.dataset.raw = raw;
      // delay select to next tick
      setTimeout(() => el.select && el.select(), 0);
    }
    function onNumInput(el, setter) {
      const before = el.value;
      const cleaned = cleanNumeric(before);
      if (cleaned !== before) {
        // restore cursor after sanitize
        const pos = el.selectionStart - (before.length - cleaned.length);
        el.value = cleaned;
        try { el.setSelectionRange(pos, pos); } catch {}
      }
      el.dataset.raw = cleaned;
      // SILENT state update — NO renderStep
      setter(cleaned);
    }
    function onNumBlur(el, setter, onCommit) {
      const raw = cleanNumeric(el.value);
      el.dataset.raw = raw;
      el.value = formatThaiNumber(raw);
      setter(raw);
      // safe to fully render now (user left the field)
      if (onCommit) onCommit();
    }

    const escape = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    function toast(msg, type = 'success') {

      const root = $('#route-content');

      if (!state.auth.loggedIn && !['sign-in','register'].includes(state.route)) {
        state.route = 'sign-in';

      // Show/hide nav + footer based on route

      const wizardProgress = $('#wizard-progress');
      const footer = $('#wizard-footer');
      const aiBtn = $('#ai-toggle');
      if (state.auth.loggedIn) {
        nav.classList.remove('hidden');
        if (state.auth.user.role_label === 'manager' || state.auth.user.role_label === 'admin') {
          $('#nav-admin').classList.remove('hidden');
        }
      } else {
        nav.classList.add('hidden');
      }
      wizardProgress.classList.toggle('hidden', state.route !== 'wizard');
      footer.classList.toggle('hidden', state.route !== 'wizard');
      aiBtn.classList.toggle('hidden', state.route !== 'wizard');
      aiBtn.classList.toggle('flex', state.route === 'wizard');
      // close ai sidebar on route change
      $('#ai-sidebar').classList.add('hidden');

        case 'sign-in':  root.appendChild(renderSignIn());  break;
        case 'register': root.appendChild(renderRegister()); break;
        case 'wizard':   renderWizard(root); break;
        case 'admin':    root.appendChild(renderAdmin()); break;

    function extractLatLng() {
      const url = state.info.google_maps_url || '';
      // Match patterns: ?q=lat,lng | @lat,lng | !3dlat!4dlng | /place/...,lat,lng
      const patterns = [
        /[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/,
        /@(-?\d+\.?\d*),(-?\d+\.?\d*)/,
        /!3d(-?\d+\.?\d*)!4d(-?\d+\.?\d*)/,
        /(-?\d+\.\d+),\s*(-?\d+\.\d+)/,
      ];
      for (const p of patterns) {
        const m = url.match(p);
        if (m) {
          state.info.location_lat = m[1];
          state.info.location_lng = m[2];
          const preview = $('#latlng-preview');
          if (preview) preview.innerHTML = `✓ Latitude: <b class="text-brand-success">${m[1]}</b> · Longitude: <b class="text-brand-success">${m[2]}</b>`;
          return;
        }
      }
      // not found
      if (url) {
        const preview = $('#latlng-preview');
        if (preview) preview.innerHTML = '⚠️ <span class="text-brand-danger">ไม่พบ lat/lng ใน URL</span>';
      }
    }

    /* ─── Contract attachments ─────────────────────────────────── */
    const DOC_TYPES = [
      { v: 'main',      l: 'สัญญาหลัก' },

      { v: 'amendment', l: 'แก้ไขสัญญา' },

    function fmtFileSize(bytes) {
      if (!bytes || isNaN(bytes)) return '-';
      const kb = bytes / 1024;
      if (kb < 1024) return kb.toFixed(1) + ' KB';
      return (kb / 1024).toFixed(2) + ' MB';
    }
    function getFileIcon(name) {
      const ext = (name || '').split('.').pop().toLowerCase();
      if (ext === 'pdf') return { icon: 'file-text', color: 'text-red-500' };
      if (['doc', 'docx'].includes(ext)) return { icon: 'file-text', color: 'text-blue-500' };
      if (['jpg', 'jpeg', 'png'].includes(ext)) return { icon: 'image', color: 'text-emerald-500' };
      return { icon: 'file', color: 'text-slate-500' };
    }
    function handleContractFiles(fileList) {
      const files = Array.from(fileList || []);
      let added = 0, skipped = 0;
      for (const f of files) {
        if (f.size > 10 * 1024 * 1024) { skipped++; continue; } // 10 MB limit
        state.contract.contract_files.push({
          id: uid(),
          name: f.name,
          size: f.size,
          type: f.type,
          uploaded_at: new Date().toISOString(),
          url: URL.createObjectURL(f), // local preview URL
          doc_type: 'main',
          source: 'upload',
        });
        added++;
      }
      if (added > 0) toast(`อัปโหลด ${added} ไฟล์สำเร็จ`);
      if (skipped > 0) toast(`ข้าม ${skipped} ไฟล์ (เกิน 10 MB)`, 'warning');
      renderContractFilesList();
    }
    function addContractFileByUrl() {
      const inp = document.getElementById('contract-url-input');
      if (!inp) return;
      const url = inp.value.trim();
      if (!url) return toast('paste URL ก่อน', 'danger');
      const name = url.split('/').pop().split('?')[0] || 'OneDrive Link';
      state.contract.contract_files.push({
        id: uid(), name, size: 0, type: 'link', uploaded_at: new Date().toISOString(),
        url, doc_type: 'main', source: 'onedrive',
      });
      inp.value = '';
      toast('เพิ่มลิงก์เอกสารแล้ว');
      renderContractFilesList();
    }

        return `
          <div class="flex items-center gap-3 rounded-xl bg-white p-3 ring-1 ring-slate-200">
            <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-slate-50">

              <i data-lucide="external-link" class="h-4 w-4"></i>

      }).join('');

        ? Math.max(0, Math.ceil((new Date(state.contract.end_date) - new Date(state.contract.start_date)) / 86400000)) : null;
      root.innerHTML = `<div class="rounded-xl bg-slate-50 p-4 text-sm"><div class="grid grid-cols-1 gap-3 md:grid-cols-3">
        <div><span class="text-slate-500">มูลค่าสัญญา:</span> <span class="font-semibold text-brand-primary">฿${fmtCurrency(v)}</span></div>

        ${state.contract.budget_estimate ? `<div><span class="text-slate-500">กำไรประมาณ:</span> <span class="font-semibold text-brand-success">฿${fmtCurrency(v - Number(state.contract.budget_estimate))}</span></div>` : ''}

    function updateChecklist1A() {
      const i = state.info;
      state.checklist.project_info = !!(i.project_name?.length >= 5 && i.client_name && i.location_address && i.site_manager_id && i.project_manager_id);
      renderChecklist();
    }
    function updateChecklist1B() {
      const c = state.contract;
      state.checklist.contract = !!(c.contract_no && c.contract_value && c.start_date && c.end_date);
      renderChecklist();
    }
    /* commit handler for contract_value blur — refreshes preview + checklist */
    function commitContractAmount() {
      updateChecklist1B();
      renderContractPreview();
    }
    function switchSubTab(id) {
      // v5: free navigation — both tabs always clickable
      state.step1Tab = id; renderStep();
    }
    /* v5: collect missing fields across both tabs and surface them clearly */
    const REQUIRED_1A = [
      { id: 'f-project_name', label: 'ชื่อโครงการ', tab: '1A', test: () => (state.info.project_name || '').length >= 1 },
      { id: 'f-client_name',  label: 'ชื่อหน่วยงานเจ้าของงาน', tab: '1A', test: () => !!state.info.client_name },
      { id: 'f-location_address', label: 'สถานที่โครงการ', tab: '1A', test: () => !!state.info.location_address },
      { id: 'f-site_manager_id',  label: 'Site Manager', tab: '1A', test: () => !!state.info.site_manager_id },
      { id: 'f-project_manager_id', label: 'วิศวกรผู้รับผิดชอบ', tab: '1A', test: () => !!state.info.project_manager_id },
    ];
    const REQUIRED_1B = [
      { id: 'f-contract_no',    label: 'เลขที่สัญญา', tab: '1B', test: () => !!state.contract.contract_no },
      { id: 'f-contract_value', label: 'มูลค่าสัญญา', tab: '1B', test: () => Number(state.contract.contract_value) > 0 },
      { id: 'f-start_date',     label: 'วันที่เริ่มสัญญา', tab: '1B', test: () => !!state.contract.start_date },
      { id: 'f-end_date',       label: 'วันที่สิ้นสุดสัญญา', tab: '1B', test: () => !!state.contract.end_date },
    ];

    function findMissing(fields) {
      return fields.filter(f => !f.test());
    }
    function highlightField(el) {
      if (!el) return;
      el.classList.add('ring-2', 'ring-brand-danger', 'border-brand-danger');
    }
    function clearFieldError(el) {
      if (!el) return;
      el.classList.remove('ring-2', 'ring-brand-danger', 'border-brand-danger');
    }
    function focusFirstMissing(missing) {
      if (missing.length === 0) return;
      const first = missing[0];
      // switch tab if needed
      if (first.tab !== state.step1Tab) {
        state.step1Tab = first.tab;
        renderStep();
        // re-highlight + scroll after re-render
        setTimeout(() => {
          missing.forEach(m => highlightField(document.getElementById(m.id)));
          const el = document.getElementById(first.id);
          if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.focus && el.focus(); }
        }, 50);
      } else {
        missing.forEach(m => highlightField(document.getElementById(m.id)));
        const el = document.getElementById(first.id);
        if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.focus && el.focus(); }
      }
    }

    function saveTab1A() {
      updateChecklist1A();
      const missing = findMissing(REQUIRED_1A);
      if (missing.length > 0) {
        toast(`ยังขาด ${missing.length} ฟิลด์: ${missing.map(m => m.label).join(', ')}`, 'danger');
        focusFirstMissing(missing);
        return;
      }
      toast('บันทึก Tab 1A สำเร็จ');
      state.step1Tab = '1B'; renderStep();
    }
    function saveTab1B() {
      updateChecklist1A(); updateChecklist1B();
      // v5: cross-validate BOTH tabs at submit time
      const missing = findMissing([...REQUIRED_1A, ...REQUIRED_1B]);
      if (missing.length > 0) {
        toast(`ยังขาด ${missing.length} ฟิลด์: ${missing.map(m => m.label).join(', ')}`, 'danger');
        focusFirstMissing(missing);
        return;
      }
      if (!state.projectCode) {
        const seq = String(Math.floor(Math.random() * 999) + 1).padStart(3, '0');
        state.projectCode = `SKB-26-${seq}`;
      }
      toast(`สร้างโครงการ ${state.projectCode} สำเร็จ`);
      state.currentStep = 2; renderStep();
    }
    function useCurrentLocation() {
      if (!navigator.geolocation) return toast('เบราว์เซอร์ไม่รองรับ', 'danger');
      navigator.geolocation.getCurrentPosition(p => {
        state.info.location_lat = p.coords.latitude.toFixed(7);

        state.info.google_maps_url = `https://maps.google.com/?q=${state.info.location_lat},${state.info.location_lng}`;
        renderStep(); toast('ดึงตำแหน่งแล้ว');
      }, () => toast('ไม่สามารถดึงตำแหน่งได้', 'danger'));

    /* ─── STEP 2 (Milestones + Gantt + Reminders) ─────────────── */
    function renderStep2() {
      const total = state.milestones.reduce((s, m) => s + Number(m.billing_amount || 0), 0);

    function renderSubMilestone(parentId, c) {

    /* ─── Gantt mini preview ─────────────────────────────────── */
    function renderGanttPreview(root) {
      const allDates = [];
      state.milestones.forEach(m => {
        if (m.plan_start_date) allDates.push(new Date(m.plan_start_date));
        if (m.plan_end_date) allDates.push(new Date(m.plan_end_date));
      });
      if (allDates.length < 2) return;
      const min = new Date(Math.min(...allDates));
      const max = new Date(Math.max(...allDates));
      const totalDays = (max - min) / 86400000 || 1;
      let html = `
        <h3 class="mb-3 flex items-center gap-2 text-sm font-semibold text-slate-700">
          <i data-lucide="bar-chart-3" class="h-4 w-4 text-brand-primary"></i> Gantt Chart Preview
        </h3>
        <div class="rounded-xl border border-slate-200 bg-white p-4">
          <div class="mb-2 flex justify-between text-[11px] text-slate-500">
            <span>${min.toLocaleDateString('th-TH')}</span>
            <span>${max.toLocaleDateString('th-TH')}</span>
          </div>
          <div class="space-y-2">
      `;
      state.milestones.forEach((m, idx) => {
        if (!m.plan_start_date || !m.plan_end_date) return;
        const sOff = ((new Date(m.plan_start_date) - min) / 86400000 / totalDays) * 100;
        const dur = (((new Date(m.plan_end_date) - new Date(m.plan_start_date)) / 86400000) / totalDays) * 100;
        const colors = ['#1A5276', '#2874A6', '#F39C12', '#27AE60', '#E74C3C', '#7D3C98'];
        html += `
          <div class="flex items-center gap-2">
            <div class="w-32 truncate text-xs text-slate-600" title="${escape(m.name || '(ไม่มีชื่อ)')}">${escape(m.name || '(ไม่มีชื่อ)')}</div>
            <div class="relative h-6 flex-1 rounded bg-slate-100">
              <div class="gantt-bar absolute h-full rounded shadow-sm" style="left:${sOff}%;width:${dur}%;background:${colors[idx % colors.length]}" title="${m.plan_start_date} → ${m.plan_end_date}"></div>

          <td class="px-2 py-2"><input class="input-base !py-1 !w-24 font-mono" type="text" inputmode="decimal" value="${escape(formatThaiNumber(isMaterial ? r.unit_price : r.rate_per_unit))}" data-raw="${escape((isMaterial ? r.unit_price : r.rate_per_unit) || '')}" onfocus="onNumFocus(this)" oninput="onNumInput(this, setBoqField('${type}','${r.id}','${isMaterial ? 'unit_price' : 'rate_per_unit'}'))" onblur="onNumBlur(this, setBoqField('${type}','${r.id}','${isMaterial ? 'unit_price' : 'rate_per_unit'}'), commitBoqRow)" /></td>

    function addBoqRow(type) {

    function isAllocOK(r) {
      const allocs = (r.allocations || []).filter(a => a.phase_id);
      if (allocs.length === 0) return false;
      const sum = allocs.reduce((s, a) => s + Number(a.percent || 0), 0);
      return Math.abs(sum - 100) < 0.01;
    }
    function updateChecklistBoq() {
      state.checklist.boq_materials = state.materials.length > 0 && state.materials.every(r => r.item_name && r.quantity && r.unit_price && isAllocOK(r));
      state.checklist.boq_labor = state.labor.length > 0 && state.labor.every(r => r.work_description && r.quantity && r.rate_per_unit && isAllocOK(r));
      renderChecklist();

    function getAllocStatus(sum, count) {
      if (count === 0) return { icon: '+', cls: 'bg-brand-accent/10 text-brand-accent' };
      if (Math.abs(sum - 100) < 0.01) return { icon: '✓', cls: 'bg-brand-success/10 text-brand-success' };
      if (sum > 100) return { icon: '⚠️', cls: 'bg-brand-danger/10 text-brand-danger' };
      return { icon: '⏳', cls: 'bg-amber-100 text-amber-700' };
    }
    function getAllocTooltip(r) {
      if (!r.allocations || r.allocations.length === 0) return 'ยังไม่ได้กำหนดงวด';
      return r.allocations.map(a => {
        const phase = state.milestones.find(m => m.id === a.phase_id);
        const sub = a.subphase_id ? phase?.children?.find(c => c.id === a.subphase_id) : null;
        const label = phase ? (phase.name || '(ไม่มีชื่อ)') + (sub ? ' / ' + (sub.name || 'ย่อย') : '') : '?';
        return `${label}: ${a.percent}%`;
      }).join('\n');
    }
    function getAllocationSummary(rows) {
      let ok = 0, partial = 0, over = 0, none = 0;
      rows.forEach(r => {
        const sum = (r.allocations || []).reduce((s, a) => s + Number(a.percent || 0), 0);
        if (!r.allocations || r.allocations.length === 0) none++;
        else if (Math.abs(sum - 100) < 0.01) ok++;
        else if (sum > 100) over++;
        else partial++;
      });
      return { ok, partial, over, none };

    /* ─── Excel paste modal ──────────────────────────────────── */

      const isMaterial = type === 'materials';

        ? 'คอนกรีต\tปูนซีเมนต์ตราช้าง 50 กก.\tถุง\t200\t120\nเหล็ก\tเหล็กเส้น SD40 12mm\tเส้น\t300\t185'
        : 'งานโครงสร้าง\tงานเทคอนกรีตฐานราก\tลบ.ม.\t50\t1500\nงานสถาปัตย์\tงานก่ออิฐฉาบปูน\tตร.ม.\t200\t280';

              <button onclick="$('#excel-paste-area').value='${example.replace(/'/g, "\\'").replace(/\n/g, '\\n')}'" class="text-xs text-brand-primary hover:underline">ลองใส่ตัวอย่าง</button>
              <div class="flex gap-2">
                <button onclick="closeModal()" class="rounded-xl px-4 py-2 text-sm text-slate-600 hover:bg-slate-100">ยกเลิก</button>
                <button onclick="parseExcelPaste('${type}')" class="rounded-xl bg-brand-primary px-5 py-2 text-sm font-semibold text-white hover:bg-brand-primary-dark">Parse → เพิ่มลงตาราง</button>
              </div>
            </div>
          </div>
        </div>
      `);
      $('#modal-root').appendChild(modal);

    function parseExcelPaste(type) {
      const txt = $('#excel-paste-area').value.trim();
      if (!txt) { toast('paste ก่อนสิ', 'danger'); return; }
      const lines = txt.split('\n').map(l => l.split('\t'));
      const isMaterial = type === 'materials';
      let added = 0;
      lines.forEach(cols => {
        if (cols.length < 4) return;
        const [c1, c2, c3, c4, c5] = cols;
        if (isMaterial) {
          state.materials.push({
            id: uid(), category: c1, material_code: '', item_name: c2,
            unit: c3, quantity: Number(c4) || 0, buffer: 5,
            unit_price: Number(c5) || 0, supplier_id: state.defaultSupplierId, allocations: [],
          });
        } else {
          state.labor.push({
            id: uid(), category: c1, work_description: c2,
            unit: c3, quantity: Number(c4) || 0, worker_count: 0, duration_days: 0,
            rate_per_unit: Number(c5) || 120, team_leader: '', allocations: [],
          });
        }
        added++;
      });
      closeModal();
      toast(`เพิ่ม ${added} รายการจาก paste สำเร็จ`);
      updateChecklistBoq();
      renderStep();
    }

    /* ─── Allocate modal v3 — Phase + Sub-phase + multi-row ─────── */
    function openAllocateModal(type, rowId) {
      const arr = type === 'materials' ? state.materials : state.labor;
      const r = arr.find(x => x.id === rowId);
      const phases = state.milestones.filter(m => m.type === 'main');
      if (phases.length === 0) return toast('ยังไม่มีงวดงาน — กรอก Step 2 ก่อน', 'danger');
      if (!r.allocations) r.allocations = [];
      // ถ้ายังไม่มี allocation เลย → สร้าง 1 row แรกให้
      if (r.allocations.length === 0) r.allocations.push({ id: uid(), phase_id: '', subphase_id: '', percent: 0 });

      const idx = arr.findIndex(x => x.id === rowId);
      const prevRow = idx > 0 ? arr[idx - 1] : null;
      const canCopy = prevRow && prevRow.allocations && prevRow.allocations.length > 0;

      const modal = h(`
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4 fade-in" onclick="if(event.target===this)closeModal()">
          <div class="w-full max-w-2xl rounded-2xl bg-white p-6 shadow-xl">
            <div class="mb-4 flex items-center justify-between">
              <div>
                <h3 class="text-lg font-semibold text-slate-800">🧩 กำหนด Allocation</h3>
                <p class="text-xs text-slate-500">${escape(type === 'materials' ? r.item_name || '(วัสดุ)' : r.work_description || '(งาน)')} — กระจายไปแต่ละงวด</p>
              </div>
              <button onclick="closeModal()" class="rounded-lg p-1 text-slate-400 hover:bg-slate-100"><i data-lucide="x" class="h-5 w-5"></i></button>
            </div>

            <!-- Quick action buttons -->
            <div class="mb-4 flex flex-wrap gap-2">
              <button onclick="autoAllocate('${type}','${rowId}')" class="flex items-center gap-1 rounded-lg bg-brand-primary/10 px-3 py-1.5 text-xs font-medium text-brand-primary hover:bg-brand-primary hover:text-white">
                <i data-lucide="wand-2" class="h-3 w-3"></i> Auto Allocate (เท่าๆกัน)
              </button>
              ${canCopy ? `<button onclick="copyFromPrevious('${type}','${rowId}')" class="flex items-center gap-1 rounded-lg bg-slate-100 px-3 py-1.5 text-xs font-medium text-slate-700 hover:bg-slate-200"><i data-lucide="copy" class="h-3 w-3"></i> Copy จากแถวก่อนหน้า</button>` : ''}
              <button onclick="addAllocationRow('${type}','${rowId}')" class="flex items-center gap-1 rounded-lg bg-brand-accent/10 px-3 py-1.5 text-xs font-medium text-brand-accent hover:bg-brand-accent hover:text-white">
                <i data-lucide="plus" class="h-3 w-3"></i> เพิ่มการกระจายงวด
              </button>
              <button onclick="clearAllocations('${type}','${rowId}')" class="ml-auto rounded-lg px-3 py-1.5 text-xs font-medium text-slate-500 hover:bg-slate-100">ล้างทั้งหมด</button>
            </div>

            <!-- Allocation rows -->
            <div id="alloc-rows" class="space-y-2 max-h-80 overflow-y-auto scroll-thin pr-1"></div>

            <!-- Sum status -->
            <div id="alloc-status" class="mt-4 rounded-xl border-2 p-3 text-center"></div>

            <div class="mt-5 flex items-center justify-end gap-2">
              <button onclick="closeModal()" class="rounded-xl px-4 py-2 text-sm text-slate-600 hover:bg-slate-100">ยกเลิก</button>
              <button onclick="saveAllocations('${type}','${rowId}')" class="rounded-xl bg-brand-primary px-5 py-2 text-sm font-semibold text-white hover:bg-brand-primary-dark">บันทึก</button>
            </div>
          </div>
        </div>
      `);
      $('#modal-root').appendChild(modal);
      renderAllocRows(type, rowId);
      lucide.createIcons();
    }
    function renderAllocRows(type, rowId) {
      const arr = type === 'materials' ? state.materials : state.labor;
      const r = arr.find(x => x.id === rowId);
      const phases = state.milestones.filter(m => m.type === 'main');
      const root = document.querySelector('#alloc-rows');
      if (!root) return;
      root.innerHTML = '';
      r.allocations.forEach((a, i) => {
        if (!a.id) a.id = uid();
        const phase = phases.find(p => p.id === a.phase_id);
        const subs = phase ? (phase.children || []) : [];
        const phaseOpts = phases.map(p => `<option value="${p.id}" ${a.phase_id === p.id ? 'selected' : ''}>งวด ${state.milestones.indexOf(p) + 1}: ${escape(p.name || '(ไม่มีชื่อ)')}</option>`).join('');
        const subOpts = subs.map(s => `<option value="${s.id}" ${a.subphase_id === s.id ? 'selected' : ''}>${escape(s.name || 'ย่อย')}</option>`).join('');
        root.appendChild(h(`
          <div class="grid grid-cols-12 items-center gap-2 rounded-xl border border-slate-200 bg-slate-50/50 p-3">
            <div class="col-span-1 text-center text-xs text-slate-400 font-mono">#${i + 1}</div>
            <div class="col-span-5">
              <select class="input-base !text-xs !py-1.5" onchange="updateAlloc('${type}','${rowId}','${a.id}','phase_id',this.value)">
                <option value="">— เลือกงวดหลัก —</option>${phaseOpts}
              </select>
            </div>
            <div class="col-span-3">
              <select class="input-base !text-xs !py-1.5" ${subs.length === 0 ? 'disabled' : ''} onchange="updateAlloc('${type}','${rowId}','${a.id}','subphase_id',this.value)">
                <option value="">${subs.length === 0 ? '(ไม่มีงวดย่อย)' : '— ทั้งงวดหลัก —'}</option>${subOpts}
              </select>
            </div>
            <div class="col-span-2">
              <div class="flex items-center gap-1">
                <input class="input-base !text-xs !py-1.5 text-right" type="number" min="0" max="100" step="0.1" value="${a.percent || 0}" oninput="updateAlloc('${type}','${rowId}','${a.id}','percent',this.value)" />
                <span class="text-xs text-slate-500">%</span>
              </div>
            </div>
            <div class="col-span-1 text-right">
              <button onclick="removeAlloc('${type}','${rowId}','${a.id}')" class="rounded p-1 text-slate-400 hover:text-brand-danger"><i data-lucide="trash-2" class="h-3.5 w-3.5"></i></button>
            </div>
          </div>
        `));
      });
      updateAllocStatus(type, rowId);
      lucide.createIcons();
    }
    function updateAlloc(type, rowId, allocId, field, val) {
      const arr = type === 'materials' ? state.materials : state.labor;
      const r = arr.find(x => x.id === rowId);
      const a = r.allocations.find(x => x.id === allocId);
      if (a) {
        a[field] = field === 'percent' ? (Number(val) || 0) : val;
        if (field === 'phase_id') a.subphase_id = ''; // reset sub when phase changes
      }
      // re-render rows ทั้งหมด (เพราะ sub dropdown ต้อง refresh ตาม phase)
      if (field === 'phase_id') renderAllocRows(type, rowId);
      else updateAllocStatus(type, rowId);
    }
    function removeAlloc(type, rowId, allocId) {
      const arr = type === 'materials' ? state.materials : state.labor;
      const r = arr.find(x => x.id === rowId);
      r.allocations = r.allocations.filter(x => x.id !== allocId);
      renderAllocRows(type, rowId);
    }
    function addAllocationRow(type, rowId) {
      const arr = type === 'materials' ? state.materials : state.labor;
      const r = arr.find(x => x.id === rowId);
      r.allocations.push({ id: uid(), phase_id: '', subphase_id: '', percent: 0 });
      renderAllocRows(type, rowId);
    }
    function clearAllocations(type, rowId) {
      const arr = type === 'materials' ? state.materials : state.labor;
      const r = arr.find(x => x.id === rowId);
      r.allocations = [{ id: uid(), phase_id: '', subphase_id: '', percent: 0 }];
      renderAllocRows(type, rowId);
    }
    function autoAllocate(type, rowId) {
      const arr = type === 'materials' ? state.materials : state.labor;
      const r = arr.find(x => x.id === rowId);
      const phases = state.milestones.filter(m => m.type === 'main');
      if (phases.length === 0) return toast('ยังไม่มีงวด', 'danger');
      const pct = Math.floor(10000 / phases.length) / 100; // 100 / N rounded
      r.allocations = phases.map((p, i) => ({
        id: uid(),
        phase_id: p.id,
        subphase_id: '',
        // ใส่เศษไว้ที่งวดสุดท้ายให้รวม 100% พอดี
        percent: i === phases.length - 1 ? Number((100 - pct * (phases.length - 1)).toFixed(2)) : pct,
      }));
      renderAllocRows(type, rowId);
      toast(`Auto allocate ${phases.length} งวด เท่าๆกัน`);
    }
    function copyFromPrevious(type, rowId) {
      const arr = type === 'materials' ? state.materials : state.labor;
      const idx = arr.findIndex(x => x.id === rowId);
      if (idx <= 0) return;
      const prev = arr[idx - 1];
      if (!prev.allocations || prev.allocations.length === 0) return toast('แถวก่อนหน้าไม่มี allocation', 'danger');
      const r = arr[idx];
      r.allocations = prev.allocations.map(a => ({ ...a, id: uid() }));
      renderAllocRows(type, rowId);
      toast('คัดลอก allocation จากแถวก่อนหน้าสำเร็จ');
    }
    function updateAllocStatus(type, rowId) {
      const arr = type === 'materials' ? state.materials : state.labor;
      const r = arr.find(x => x.id === rowId);
      const sum = r.allocations.reduce((s, a) => s + Number(a.percent || 0), 0);
      const hasInvalid = r.allocations.some(a => !a.phase_id);
      const root = document.querySelector('#alloc-status');
      if (!root) return;
      let cls = 'border-amber-300 bg-amber-50 text-amber-800';
      let icon = '⏳';
      let msg = `ยังไม่ครบ 100% (ตอนนี้ ${sum.toFixed(1)}%)`;
      if (hasInvalid) {
        cls = 'border-red-300 bg-red-50 text-red-800';
        icon = '❌';
        msg = 'มีแถวที่ยังไม่เลือกงวดหลัก';
      } else if (Math.abs(sum - 100) < 0.01) {
        cls = 'border-brand-success/40 bg-emerald-50 text-brand-success';
        icon = '✅';
        msg = 'รวมครบ 100% — บันทึกได้';
      } else if (sum > 100) {
        cls = 'border-red-300 bg-red-50 text-red-800';
        icon = '⚠️';
        msg = `เกิน 100% (${sum.toFixed(1)}%)`;
      }
      // duplicate phase+sub check
      const seen = new Set();
      for (const a of r.allocations) {
        if (!a.phase_id) continue;
        const key = `${a.phase_id}|${a.subphase_id || ''}`;
        if (seen.has(key)) {
          cls = 'border-red-300 bg-red-50 text-red-800';
          icon = '⚠️';
          msg = 'มีงวด+งวดย่อยซ้ำกัน';
          break;
        }
        seen.add(key);
      }
      root.className = `mt-4 rounded-xl border-2 p-3 text-center font-semibold ${cls}`;
      root.innerHTML = `${icon} ${msg}`;
    }
    function closeModal() { $('#modal-root').innerHTML = ''; }
    function saveAllocations(type, rowId) {
      const arr = type === 'materials' ? state.materials : state.labor;
      const r = arr.find(x => x.id === rowId);
      // ลบ allocation rows ที่ไม่มี phase
      r.allocations = r.allocations.filter(a => a.phase_id);
      const sum = r.allocations.reduce((s, a) => s + Number(a.percent || 0), 0);
      if (r.allocations.length === 0) return toast('ต้องมีอย่างน้อย 1 งวด', 'danger');
      if (Math.abs(sum - 100) > 0.01) return toast(`ต้องได้ 100% (ตอนนี้ ${sum.toFixed(1)}%)`, 'danger');
      // duplicate check
      const seen = new Set();
      for (const a of r.allocations) {
        const key = `${a.phase_id}|${a.subphase_id || ''}`;
        if (seen.has(key)) return toast('มีงวด+งวดย่อยซ้ำกัน', 'danger');
        seen.add(key);
      }
      closeModal(); toast('บันทึก allocation สำเร็จ');
      updateChecklistBoq(); renderStep();
    }

    /* ─── STEP 5 (Site Team) ─────────────────────────────────── */
    function renderStep5() {
      const card = h(`
        <div class="rounded-2xl bg-white p-6 shadow-soft">
          <div class="mb-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-brand-primary/10 text-brand-primary"><i data-lucide="users" class="h-5 w-5"></i></div>
              <div><h2 class="text-lg font-semibold text-slate-800">Step 5 · ทีมงานหน้างาน</h2><p class="text-xs text-slate-500">LINE ID = HR check-in GPS + จ่ายค่าแรง</p></div>
            </div>
            <button onclick="addMember()" class="flex items-center gap-2 rounded-xl bg-brand-primary px-4 py-2 text-sm font-semibold text-white hover:bg-brand-primary-dark"><i data-lucide="user-plus" class="h-4 w-4"></i> เพิ่มสมาชิก</button>
          </div>
          <div id="team-cards" class="grid grid-cols-1 gap-4 md:grid-cols-2"></div>
          ${state.team.length === 0 ? `<div class="rounded-xl border-2 border-dashed border-slate-200 p-10 text-center text-sm text-slate-500">ยังไม่มีสมาชิก</div>` : ''}
          <div class="mt-8 border-t border-slate-200 pt-6">
            <button onclick="finalSubmit()" ${allDone() ? '' : 'disabled'} class="w-full rounded-xl bg-brand-success px-6 py-4 text-base font-bold text-white shadow-soft transition hover:bg-emerald-700 disabled:cursor-not-allowed disabled:opacity-50">🎉 ส่งข้อมูลเข้าระบบ</button>
            ${!allDone() ? `<p class="mt-2 text-center text-xs text-brand-danger">⚠️ ยังกรอกไม่ครบ — เปิด AI Guide ดูว่าขาดอะไร</p>` : '<p class="mt-2 text-center text-xs text-brand-success">✅ พร้อมส่งแล้ว</p>'}
          </div>
        </div>
      `);
      setTimeout(() => {
        const grid = card.querySelector('#team-cards');
        state.team.forEach((p, idx) => grid.appendChild(renderTeamCard(p, idx)));
        lucide.createIcons();
      }, 0);
      return card;
    }
    function renderTeamCard(p, idx) {
      const roleOpts = ROLE_LABELS.map(r => `<option value="${r.value}" ${p.role_label === r.value ? 'selected' : ''}>${r.label}</option>`).join('');
      return h(`
        <div class="rounded-xl border border-slate-200 bg-white p-4">
          <div class="mb-3 flex items-center justify-between"><span class="text-xs font-medium text-slate-400">#${idx + 1}</span><button onclick="removeMember('${p.id}')" class="rounded p-1 text-slate-400 hover:bg-red-50 hover:text-brand-danger"><i data-lucide="trash-2" class="h-4 w-4"></i></button></div>
          <div class="space-y-3">
            <div><label class="label-base required">ชื่อ-นามสกุล</label><input class="input-base" value="${escape(p.full_name || '')}" oninput="updateMember('${p.id}','full_name',this.value)" /></div>
            <div class="grid grid-cols-2 gap-2">
              <div><label class="label-base">ตำแหน่ง</label><select class="input-base" onchange="updateMember('${p.id}','role_label',this.value)">${roleOpts}</select></div>
              <div><label class="label-base">วันเริ่มงาน</label><input class="input-base" type="date" value="${escape(p.start_date || '')}" oninput="updateMember('${p.id}','start_date',this.value)" /></div>
            </div>
            <div class="grid grid-cols-2 gap-2">
              <div><label class="label-base required">เบอร์โทร</label><input class="input-base" placeholder="08X-XXX-XXXX" value="${escape(p.phone || '')}" oninput="updateMember('${p.id}','phone',this.value)" /></div>
              <div><label class="label-base required">LINE ID</label><input class="input-base" value="${escape(p.line_id || '')}" oninput="updateMember('${p.id}','line_id',this.value)" /></div>
            </div>
            <div><label class="label-base">รายงานตรงต่อ</label><input class="input-base" value="${escape(p.report_to || '')}" oninput="updateMember('${p.id}','report_to',this.value)" /></div>
          </div>
        </div>
      `);
    }
    function addMember() { state.team.push({ id: uid(), full_name: '', role_label: 'worker', phone: '', line_id: '', start_date: '', report_to: '' }); updateChecklistTeam(); renderStep(); }
    function updateMember(id, f, v) { const p = state.team.find(x => x.id === id); if (p) p[f] = v; updateChecklistTeam(); }
    function removeMember(id) { state.team = state.team.filter(x => x.id !== id); updateChecklistTeam(); renderStep(); }
    function updateChecklistTeam() { state.checklist.team = state.team.length > 0 && state.team.every(p => p.full_name && p.phone && p.line_id); renderChecklist(); }

    /* ─── Nav + global ──────────────────────────────────────── */
    function goToStep(n) { if (n > state.currentStep + 1) return toast('กรอก step ก่อนหน้าให้เสร็จก่อน', 'danger'); state.currentStep = n; renderStep(); }
    function nextStep() {
      // v5: Step 1 — cross-validate BOTH tabs before moving on
      if (state.currentStep === 1) {
        updateChecklist1A(); updateChecklist1B();
        const missing = findMissing([...REQUIRED_1A, ...REQUIRED_1B]);
        if (missing.length > 0) {
          toast(`ยังขาด ${missing.length} ฟิลด์: ${missing.map(m => m.label).join(', ')}`, 'danger');
          focusFirstMissing(missing);
          return;
        }
        if (!state.projectCode) {
          const seq = String(Math.floor(Math.random() * 999) + 1).padStart(3, '0');
          state.projectCode = `SKB-26-${seq}`;
          toast(`สร้างโครงการ ${state.projectCode} สำเร็จ`);
        }
      }
      // Block "Next" if BOQ allocation incomplete
      if (state.currentStep === 3 && state.materials.length > 0) {
        const s = getAllocationSummary(state.materials);
        if (s.ok < state.materials.length) return toast(`ยังมี ${state.materials.length - s.ok} รายการที่ allocation ไม่ครบ 100%`, 'danger');
      }
      if (state.currentStep === 4 && state.labor.length > 0) {
        const s = getAllocationSummary(state.labor);
        if (s.ok < state.labor.length) return toast(`ยังมี ${state.labor.length - s.ok} รายการที่ allocation ไม่ครบ 100%`, 'danger');
      }
      if (state.currentStep < 5) { state.currentStep++; renderStep(); }
    }
    function prevStep() { if (state.currentStep > 1) { state.currentStep--; renderStep(); } }
    function saveDraft() { const ind = $('#autosave-indicator'); if (ind) ind.textContent = '💾 บันทึก draft ' + new Date().toLocaleTimeString('th-TH'); toast('บันทึก draft'); }
    function allDone() { return Object.values(state.checklist).every(Boolean); }
    function finalSubmit() { if (!allDone()) return toast('ยังกรอกไม่ครบ', 'danger'); toast('🎉 ส่งสำเร็จ! (mock — ของจริงจะ POST ไป n8n webhook)'); }
    function toggleAiGuide() { const sb = $('#ai-sidebar'); sb.classList.toggle('hidden'); if (!sb.classList.contains('hidden')) sb.classList.add('slide-in'); lucide.createIcons(); }

    setInterval(() => { const ind = $('#autosave-indicator'); if (ind && state.route === 'wizard') ind.textContent = '💾 auto-saved ' + new Date().toLocaleTimeString('th-TH'); }, 30000);

    /* ─── INIT ──────────────────────────────────────────────── */
    const initialHash = (window.location.hash || '#sign-in').slice(1);
    state.route = ['sign-in','register','wizard','admin'].includes(initialHash) ? initialHash : 'sign-in';
    render();
  </script>
</body>
</html>
